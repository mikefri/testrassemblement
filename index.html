<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Déclaration d'anomalie – Rassemblement kit</title>

  <!-- PWA Meta Tags -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#e8600a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Anomalies Kit">
  <link rel="apple-touch-icon" href="./icons/icon-152x152.png">
  <link rel="icon" type="image/x-icon" href="./icons/favicon.ico">

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    /* ── Tokens ── */
    :root {
      --bg:        #f0f2f5;
      --surface:   #ffffff;
      --primary:   #151c2c;
      --accent:    #e8600a;
      --accent-lt: #fff3eb;
      --border:    #dde1e8;
      --muted:     #6b7280;
      --success-bg:#dcfce7;
      --success:   #15803d;
      --radius:    14px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      color: #111827;
    }

    /* ══════════════════════════════════════════
       PAGE DE CONNEXION
    ══════════════════════════════════════════ */
    #login-view {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: var(--primary);
    }

    .login-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 36px 32px 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      animation: login-pop .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes login-pop {
      from { opacity:0; transform: scale(.92) translateY(20px); }
      to   { opacity:1; transform: scale(1)   translateY(0); }
    }

    .login-logo {
      width: 52px; height: 52px;
      background: var(--accent);
      border-radius: 14px;
      display: grid; place-items: center;
      font-size: 26px;
      margin: 0 auto 20px;
    }

    .version-badge {
      font-size: 10px;
      font-weight: 600;
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      padding: 2px 7px;
      border-radius: 100px;
      vertical-align: middle;
      letter-spacing: 0.03em;
    }

    .login-card h1 {
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 4px;
      letter-spacing: -.02em;
    }
    .login-card .login-subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .login-field { margin-bottom: 14px; }
    .login-field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 6px;
    }
    .login-field input {
      width: 100%;
      padding: 13px 15px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      color: #111827;
      background: var(--bg);
      outline: none;
      transition: border-color .15s, background .15s;
      font-family: var(--font);
    }
    .login-field input:focus { border-color: var(--accent); background: #fff; }
    .login-field input.error { border-color: #dc2626; background: #fff5f5; }

    .login-error {
      background: #fef2f2;
      border: 1.5px solid #fca5a5;
      border-radius: 9px;
      padding: 11px 14px;
      font-size: 13px;
      color: #dc2626;
      font-weight: 500;
      margin-bottom: 14px;
      display: none;
    }
    .login-error.show { display: block; }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 11px;
      cursor: pointer;
      font-family: var(--font);
      transition: filter .15s, transform .1s;
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-login:hover   { filter: brightness(1.08); }
    .btn-login:active  { transform: scale(.98); }
    .btn-login:disabled { opacity: .55; cursor: not-allowed; }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════
       APP PRINCIPALE
    ══════════════════════════════════════════ */
    #app-view { display: none; }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-titles { min-width: 0; flex: 1; overflow: hidden; }
    header h1 {
      font-size: 15px; font-weight: 700; letter-spacing: -0.01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    header p { font-size: 11px; opacity: 0.55; margin-top: 1px; }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-header {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 11px;
      font-size: 12px;
      cursor: pointer;
      font-family: var(--font);
      transition: background .15s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-header:hover { background: rgba(255,255,255,0.22); }

    .user-chip {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 100px;
      padding: 5px 12px 5px 8px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      max-width: 160px;
    }
    .user-avatar {
      width: 24px; height: 24px;
      background: var(--accent);
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0; color: #fff;
    }
    .user-email { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Container ── */
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px 14px 56px;
    }

    /* ── Progress ── */
    .progress-wrap { margin-bottom: 16px; }
    .progress-track { background: var(--border); height: 5px; border-radius: 10px; overflow: hidden; }
    .progress-fill  { background: var(--accent); height: 100%; border-radius: 10px; transition: width .35s ease; }
    .progress-label { font-size: 12px; color: var(--muted); margin-top: 5px; text-align: right; }

    /* ── Breadcrumb ── */
    .breadcrumb { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; align-items: center; }
    .bc-item {
      font-size: 11px; background: var(--accent-lt); color: var(--accent);
      font-weight: 600; padding: 3px 9px; border-radius: 100px; white-space: nowrap;
    }
    .bc-sep { color: var(--muted); font-size: 12px; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 20px 18px;
      margin-bottom: 12px;
      animation: slide-up .2s ease;
    }
    @keyframes slide-up {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .step-tag {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .09em; color: var(--muted); margin-bottom: 6px;
    }
    .step-question { font-size: 18px; font-weight: 700; color: #111827; line-height: 1.3; margin-bottom: 16px; }

    /* ── Options ── */
    .options { display: flex; flex-direction: column; gap: 9px; }

    .opt-btn {
      width: 100%; text-align: left;
      padding: 14px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 11px;
      font-size: 15px; font-weight: 500; color: #111827;
      cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 10px;
      transition: border-color .15s, background .15s, color .15s;
      font-family: var(--font); line-height: 1.35;
      -webkit-tap-highlight-color: transparent;
    }
    .opt-btn:hover  { border-color: var(--accent); background: var(--accent-lt); color: var(--accent); }
    .opt-btn:active { background: var(--accent-lt); border-color: var(--accent); }
    .opt-btn .chevron { opacity: .4; font-size: 20px; flex-shrink: 0; }

    /* ── Fields ── */
    .fields { display: flex; flex-direction: column; gap: 13px; }

    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
    .field input,
    .field textarea {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 9px;
      font-size: 16px;
      color: #111827; background: var(--bg);
      outline: none; transition: border-color .15s, background .15s;
      font-family: var(--font);
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
    .field textarea { resize: vertical; min-height: 100px; }
    .field input.error { border-color: #dc2626; }

    /* ── Info banner ── */
    .info-banner {
      background: var(--accent-lt); border: 1.5px solid var(--accent);
      border-radius: 10px; padding: 14px 16px;
      font-size: 15px; color: #9a3e00; font-weight: 500; line-height: 1.5;
    }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 10px; margin-top: 20px; }

    .btn {
      border: none; border-radius: 10px; padding: 14px 16px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: filter .15s, transform .1s; font-family: var(--font);
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(.98); }
    .btn-back { background: var(--border); color: var(--muted); flex: 0 0 auto; }
    .btn-back:hover { filter: brightness(.93); }
    .btn-next { background: var(--accent); color: #fff; flex: 1; }
    .btn-next:hover { filter: brightness(1.07); }

    .btn-submit-main {
      width: 100%; padding: 16px;
      background: var(--success); color: #fff;
      font-size: 17px; font-weight: 700; border-radius: 12px;
      border: none; cursor: pointer; font-family: var(--font);
      transition: filter .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-submit-main:hover { filter: brightness(1.07); }
    .btn-submit-main:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Summary ── */
    .summary-table { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 14px; }
    .summary-header {
      background: var(--primary); color: #fff;
      padding: 13px 16px; font-size: 14px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }
    .summary-row {
      display: flex; flex-wrap: wrap;
      padding: 11px 16px; border-bottom: 1px solid var(--border);
      gap: 4px 10px; background: var(--surface);
    }
    .summary-row:last-child { border-bottom: none; }
    .s-key { font-size: 12px; color: var(--muted); font-weight: 500; min-width: 120px; flex-shrink: 0; }
    .s-val { font-size: 13px; color: #111827; font-weight: 600; word-break: break-word; }

    /* ── Success ── */
    .success-state {
      text-align: center; background: var(--success-bg);
      border: 1.5px solid #86efac; border-radius: var(--radius);
      padding: 28px 20px; display: none;
    }
    .success-state.show { display: block; }
    .success-icon { font-size: 48px; margin-bottom: 12px; }
    .success-state h2 { color: var(--success); font-size: 20px; margin-bottom: 8px; }
    .success-state p  { color: #166534; font-size: 14px; }
    .btn-new {
      margin-top: 16px; padding: 12px 28px;
      background: var(--success); color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font);
    }

    /* ── History ── */
    .history-wrap { display: none; }
    .history-wrap.show { display: block; }
    .history-item { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 13px 16px; margin-bottom: 10px; }
    .history-item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
    .hist-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 100px; background: var(--accent-lt); color: var(--accent); text-transform: uppercase; letter-spacing: .05em; }
    .hist-date  { font-size: 11px; color: var(--muted); margin-left: auto; }
    .hist-path  { font-size: 13px; font-weight: 600; color: #111827; }
    .hist-fields { font-size: 12px; color: var(--muted); margin-top: 3px; word-break: break-word; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }

    /* ══════════════════════════════════════════
       RESPONSIVE — MOBILE  (≤ 480px)
    ══════════════════════════════════════════ */
    @media (max-width: 480px) {
      header { padding: 10px 12px; gap: 10px; }
      header p { display: none; }
      header h1 { font-size: 14px; }
      .user-chip { padding: 5px; max-width: none; border-radius: 50%; width: 32px; height: 32px; justify-content: center; }
      .user-email { display: none; }
      .btn-header { padding: 6px 9px; font-size: 11px; }
      .login-card { padding: 24px 18px 20px; border-radius: 16px; }
      .login-card h1 { font-size: 18px; }
      .container { padding: 14px 10px 72px; }
      .card { padding: 16px 14px; border-radius: 12px; }
      .step-question { font-size: 16px; }
      .opt-btn { font-size: 14px; padding: 15px 14px; border-radius: 10px; }
      .btn-row { flex-direction: column; gap: 8px; }
      .btn-back { order: 2; text-align: center; }
      .btn-next { order: 1; padding: 15px; }
      .summary-row { flex-direction: column; gap: 2px; padding: 10px 14px; }
      .s-key { min-width: unset; font-size: 11px; }
      .s-val { font-size: 14px; }
      .btn-submit-main { font-size: 16px; }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      .user-chip { max-width: 130px; }
      header h1 { font-size: 15px; }
      .login-card { padding: 32px 28px 28px; }
      .step-question { font-size: 17px; }
      .container { padding: 18px 16px 60px; }
      .btn-row { flex-direction: row; }
    }

    @media (min-width: 769px) {
      header { padding: 14px 24px; gap: 14px; }
      header h1 { font-size: 17px; }
      header p { display: block; }
      .logo { width: 40px; height: 40px; font-size: 20px; }
      .container { padding: 24px 20px 56px; }
      .card { padding: 24px 22px; }
      .step-question { font-size: 19px; }
      .opt-btn { font-size: 16px; padding: 15px 18px; }
      .btn-row { flex-direction: row; }
    }
  </style>
</head>
<body>

<!-- PAGE DE CONNEXION -->
<div id="login-view">
  <div class="login-card">
    <div class="login-logo">⚠</div>
    <h1>Déclaration d'anomalie</h1>
    <p class="login-subtitle">Rassemblement de kit · Connexion requise</p>
    <div class="login-error" id="login-error"></div>
    <div class="login-field">
      <label>Adresse e-mail</label>
      <input type="email" id="login-email" placeholder="prenom.nom@entreprise.fr" autocomplete="username" />
    </div>
    <div class="login-field">
      <label>Mot de passe</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">Se connecter</button>
  </div>
  <p class="login-footer">Accès réservé au personnel autorisé</p>
</div>

<!-- APP PRINCIPALE -->
<div id="app-view">
  <header>
    <div class="logo">
      <img src="./icons/icon-32x32.png" alt="Logo" style="width:24px; height:24px;">
    </div>
    <div class="header-titles">
      <h1>Déclaration d'anomalie</h1>
      <p>Rassemblement de kit <span class="version-badge">v1.0</span></p>
    </div>
    <div class="header-right">
      <div class="user-chip" id="user-chip" title="Utilisateur connecté">
        <div class="user-avatar" id="user-avatar">?</div>
        <span class="user-email" id="user-email-display">—</span>
      </div>
      <button class="btn-header" onclick="toggleHistory()">📋 Historique</button>
      <button class="btn-header" onclick="doLogout()" title="Se déconnecter">🔓 Déco.</button>
    </div>
  </header>

  <div class="container">
    <div id="form-view">
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progress-bar" style="width:0%"></div></div>
        <div class="progress-label" id="progress-label">Étape 1</div>
      </div>
      <div class="breadcrumb" id="breadcrumb"></div>
      <div id="step-container"></div>
    </div>

    <div class="history-wrap" id="history-view">
      <div class="card" style="margin-bottom:0">
        <div class="step-tag">Historique</div>
        <div class="step-question" style="font-size:17px; margin-bottom:16px;">Anomalies déclarées</div>
        <div id="history-list"><p class="empty-state" style="padding:20px 0">Chargement…</p></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-next" onclick="toggleHistory()">← Nouvelle déclaration</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════
   ARBORESCENCE — définie uniquement dans tree.json
   Le HTML ne contient plus aucune logique métier.
   Pour faire évoluer l'appli, modifiez seulement tree.json.
   ════════════════════════════════════════════════════════════ */
let TREE = null; // sera rempli par fetch('./tree.json') au démarrage

/* ════════════════════════════════════════════════════════════
   MOTEUR GÉNÉRIQUE — ne pas modifier sauf pour ajouter
   un nouveau type de nœud
   ════════════════════════════════════════════════════════════ */

/* ── Firebase ── */
const firebaseConfig = {
  apiKey: "AIzaSyARI0sADSyvYcTwaSlK0TpvLY0uwL2BlRw",
  authDomain: "rassemblement-b7927.firebaseapp.com",
  projectId: "rassemblement-b7927",
  storageBucket: "rassemblement-b7927.firebasestorage.app",
  messagingSenderId: "127334162906",
  appId: "1:127334162906:web:92c2e6281c93df6eab20e3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(), auth = firebase.auth();

/* ── Chargement de l'arborescence puis démarrage de l'auth ── */
fetch('./tree.json')
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(data => {
    TREE = data;
    auth.onAuthStateChanged(u => u ? showApp(u) : showLogin());
  })
  .catch(err => {
    document.body.innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
                  background:#151c2c;font-family:system-ui;text-align:center;padding:24px">
        <div style="background:#fff;border-radius:16px;padding:32px;max-width:400px">
          <div style="font-size:40px;margin-bottom:12px">⚠️</div>
          <h2 style="color:#151c2c;margin-bottom:8px">Impossible de charger tree.json</h2>
          <p style="color:#6b7280;font-size:14px">Vérifiez que <strong>tree.json</strong>
          est dans le même dossier que index.html.</p>
          <p style="color:#dc2626;font-size:12px;margin-top:12px">${err.message}</p>
        </div>
      </div>`;
  });

async function doLogin() {
  const email = document.getElementById("login-email").value.trim();
  const pass  = document.getElementById("login-password").value;
  const btn   = document.getElementById("login-btn");
  document.getElementById("login-error").classList.remove("show");
  ["login-email","login-password"].forEach(id => document.getElementById(id).classList.remove("error"));
  if (!email || !pass) {
    showLoginError("Veuillez remplir tous les champs.");
    if (!email) document.getElementById("login-email").classList.add("error");
    if (!pass)  document.getElementById("login-password").classList.add("error");
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>&nbsp;Connexion…';
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(err) {
    btn.disabled = false; btn.innerHTML = "Se connecter";
    const msgs = {
      "auth/user-not-found":       "Aucun compte trouvé pour cet e-mail.",
      "auth/wrong-password":       "Mot de passe incorrect.",
      "auth/invalid-email":        "Adresse e-mail invalide.",
      "auth/too-many-requests":    "Trop de tentatives. Réessayez dans quelques minutes.",
      "auth/invalid-credential":   "Identifiants incorrects. Vérifiez votre e-mail et mot de passe.",
      "auth/network-request-failed":"Erreur réseau. Vérifiez votre connexion."
    };
    showLoginError(msgs[err.code] || "Erreur : " + err.message);
  }
}
function showLoginError(msg) {
  const b = document.getElementById("login-error");
  b.textContent = "⚠ " + msg; b.classList.add("show");
}
async function doLogout() {
  if (!confirm("Se déconnecter ?")) return;
  await auth.signOut();
}
function showLogin() {
  document.getElementById("login-view").style.display = "flex";
  document.getElementById("app-view").style.display   = "none";
  document.getElementById("login-email").value    = "";
  document.getElementById("login-password").value = "";
  document.getElementById("login-error").classList.remove("show");
  const btn = document.getElementById("login-btn");
  btn.disabled = false; btn.innerHTML = "Se connecter";
}
function showApp(user) {
  document.getElementById("login-view").style.display = "none";
  document.getElementById("app-view").style.display   = "block";
  const email = user.email || "";
  document.getElementById("user-avatar").textContent        = email.charAt(0).toUpperCase();
  document.getElementById("user-email-display").textContent = email;
  restart();
}
document.addEventListener("keydown", e => {
  if (e.key === "Enter" && document.getElementById("login-view").style.display !== "none") doLogin();
});

/* ── État de navigation ── */
// currentStepId : identifiant (string) du nœud actif dans TREE.nodes
// stepHistory   : pile pour le bouton Retour
// collected     : valeurs saisies par l'utilisateur
// breadcrumb    : libellés des choix effectués (affiché en haut)
let currentStepId = TREE.start;
let stepHistory   = [];
let collected     = {};
let breadcrumb    = [];

const ESTIMATED_MAX = 9; // pour la barre de progression

/* ── Rendu principal ── */
function render() {
  const step = TREE.nodes[currentStepId];

  // Barre de progression
  const pct = Math.min(Math.round((stepHistory.length / ESTIMATED_MAX) * 100), 95);
  document.getElementById("progress-bar").style.width    = pct + "%";
  document.getElementById("progress-label").textContent  = "Étape " + (stepHistory.length + 1);

  // Fil d'Ariane
  document.getElementById("breadcrumb").innerHTML = breadcrumb.map((b, i) =>
    (i > 0 ? '<span class="bc-sep">›</span>' : '') +
    `<span class="bc-item">${b}</span>`
  ).join("");

  // Corps de l'étape
  let inner = `<div class="step-tag">${step.tag || ""}</div>
               <div class="step-question">${step.question}</div>`;

  if (step.type === "select") {
    // ── Liste de boutons-options ──
    inner += `<div class="options">${
      step.options.map((o, i) =>
        `<button class="opt-btn" onclick="pickOption(${i})">
           <span>${o.label}</span>
           <span class="chevron">›</span>
         </button>`
      ).join("")
    }</div>`;

  } else if (step.type === "fields") {
    // ── Plusieurs champs texte ──
    inner += `<div class="fields">${
      step.fields.map(f =>
        `<div class="field">
           <label>${f.label}</label>
           <input id="f_${f.key}" placeholder="${f.placeholder}"
                  value="${esc(collected[f.key] || "")}" />
         </div>`
      ).join("")
    }</div>` + navButtons("submitFields()");

  } else if (step.type === "text") {
    // ── Un seul champ texte ──
    inner += `<div class="fields"><div class="field">
      <input id="txt_field" placeholder="${step.placeholder}"
             value="${esc(collected[step.field] || "")}" />
    </div></div>` + navButtons("submitText()");

  } else if (step.type === "textarea") {
    // ── Zone de texte libre (commentaire / dernière étape) ──
    const isLast  = step.next === null;
    const btnLabel = isLast ? "📋 Voir le récapitulatif" : "Suivant →";
    inner += `<div class="fields"><div class="field">
      <textarea id="ta_field" placeholder="${step.placeholder}">${
        esc(collected[step.field || "commentaire"] || "")
      }</textarea>
    </div></div>` + navButtons("submitTextarea()", btnLabel);

  } else if (step.type === "info") {
    // ── Bannière d'information (pas de saisie) ──
    inner += `<div class="info-banner">${step.message}</div>` +
             navButtons("advanceStep()");
  }

  document.getElementById("step-container").innerHTML =
    `<div class="card">${inner}</div>`;
}

/* Génère les boutons Retour / Suivant */
function navButtons(onNext, nextLabel = "Suivant →") {
  const back = stepHistory.length > 0
    ? `<button class="btn btn-back" onclick="goBack()">← Retour</button>`
    : "";
  return `<div class="btn-row">
    ${back}
    <button class="btn btn-next" onclick="${onNext}">${nextLabel}</button>
  </div>`;
}

function esc(s) {
  return String(s).replace(/"/g, "&quot;").replace(/</g, "&lt;");
}

/* ── Navigation ── */

// L'utilisateur clique sur une option d'un nœud "select"
function pickOption(i) {
  const step = TREE.nodes[currentStepId];
  const opt  = step.options[i];
  pushHistory();
  breadcrumb.push(opt.label);
  // On mémorise le choix sous la clé "nX" (pour le récapitulatif)
  collected["n" + stepHistory.length] = opt.label;
  currentStepId = opt.next;
  render();
}

// Valider un nœud "fields" (plusieurs champs)
function submitFields() {
  const step = TREE.nodes[currentStepId];
  let ok = true;
  step.fields.forEach(f => {
    const el  = document.getElementById("f_" + f.key);
    const val = el.value.trim();
    if (f.required && !val) { el.classList.add("error"); ok = false; }
    else { el.classList.remove("error"); collected[f.key] = val; }
  });
  if (!ok) { alert("❗ Veuillez remplir tous les champs obligatoires (*)"); return; }
  pushHistory();
  currentStepId = step.next;
  render();
}

// Valider un nœud "text" (un seul champ)
function submitText() {
  const step = TREE.nodes[currentStepId];
  const val  = document.getElementById("txt_field").value.trim();
  if (step.required && !val) { alert("❗ Ce champ est obligatoire."); return; }
  collected[step.field] = val;
  pushHistory();
  currentStepId = step.next;
  render();
}

// Valider un nœud "textarea" (commentaire)
function submitTextarea() {
  const step = TREE.nodes[currentStepId];
  collected[step.field || "commentaire"] = document.getElementById("ta_field").value.trim();
  pushHistory();
  if (step.next === null) {
    renderSummary(); // fin de parcours → récapitulatif
  } else {
    currentStepId = step.next;
    render();
  }
}

// Avancer depuis un nœud "info" (pas de saisie)
function advanceStep() {
  const step = TREE.nodes[currentStepId];
  pushHistory();
  currentStepId = step.next;
  render();
}

// Retour à l'étape précédente
function goBack() {
  if (!stepHistory.length) return;
  const prev    = stepHistory.pop();
  currentStepId = prev.stepId;
  collected     = prev.collected;
  breadcrumb    = prev.breadcrumb;
  render();
}

// Empile l'état courant avant de changer d'étape
function pushHistory() {
  stepHistory.push({
    stepId:     currentStepId,
    collected:  JSON.parse(JSON.stringify(collected)),
    breadcrumb: [...breadcrumb]
  });
}

/* ── Récapitulatif ── */
const LABEL_MAP = {
  support:    "Support",
  kit:        "Kit",
  engin:      "Engin",
  commentaire:"Commentaire",
  preco:      "Préconisation",
  stockage_hs:"Emplacement HS"
};

function renderSummary() {
  document.getElementById("progress-bar").style.width    = "100%";
  document.getElementById("progress-label").textContent  = "Récapitulatif";

  // Chemin de décision : toutes les clés "nX"
  const path = [];
  for (let i = 1; ; i++) {
    if (collected["n" + i]) path.push(collected["n" + i]); else break;
  }

  // Données saisies : tout sauf les clés "nX"
  const extras = Object.entries(collected)
    .filter(([k]) => !k.startsWith("n"))
    .map(([k, v]) => ({ key: LABEL_MAP[k] || k, val: v || "—" }));

  document.getElementById("step-container").innerHTML = `
    <div class="card" style="margin-bottom:14px">
      <div class="step-tag">Récapitulatif</div>
      <div class="step-question" style="font-size:17px">Vérifiez avant d'enregistrer</div>
    </div>
    <div class="summary-table">
      <div class="summary-header">📋 Chemin d'anomalie</div>
      ${path.map((p, i) =>
        `<div class="summary-row">
           <span class="s-key">Niveau ${i + 1}</span>
           <span class="s-val">${p}</span>
         </div>`
      ).join("")}
    </div>
    ${extras.length ? `
    <div class="summary-table">
      <div class="summary-header">📝 Données saisies</div>
      ${extras.map(e =>
        `<div class="summary-row">
           <span class="s-key">${e.key}</span>
           <span class="s-val">${e.val}</span>
         </div>`
      ).join("")}
    </div>` : ""}
    <div style="display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap;">
      <button class="btn btn-back" style="flex:0 0 auto" onclick="restart()">↺ Recommencer</button>
      <button class="btn-submit-main" id="save-btn" onclick="saveAnomaly()"
              style="flex:1; min-width:180px">✅ Enregistrer l'anomalie</button>
    </div>
    <div class="success-state" id="success-state">
      <div class="success-icon">✅</div>
      <h2>Anomalie enregistrée !</h2>
      <p>La déclaration a été sauvegardée avec succès.</p>
      <button class="btn-new" onclick="restart()">+ Nouvelle déclaration</button>
    </div>`;
}

/* ── Enregistrement Firebase ── */
async function saveAnomaly() {
  const btn = document.getElementById("save-btn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner" style="
    border-top-color:#fff; border-color:#fff4; width:18px; height:18px;
    display:inline-block; vertical-align:middle; margin-right:8px;
    border-radius:50%; animation:spin .7s linear infinite;
    border-width:2.5px; flex-shrink:0"></span>Enregistrement…`;

  const path = [];
  for (let i = 1; ; i++) { if (collected["n" + i]) path.push(collected["n" + i]); else break; }

  const user = auth.currentUser;
  try {
    await db.collection("anomalies").add({
      chemin:         path,
      categorie:      path[0] || "",
      support:        collected.support     || "",
      kit:            collected.kit         || "",
      engin:          collected.engin       || "",
      commentaire:    collected.commentaire || "",
      preco:          collected.preco       || "",
      stockage_hs:    collected.stockage_hs || "",
      date:           new Date().toISOString(),
      ts:             firebase.firestore.FieldValue.serverTimestamp(),
      declarant_uid:  user?.uid   || "",
      declarant_email:user?.email || ""
    });
    document.getElementById("success-state").classList.add("show");
    btn.style.display = "none";
  } catch(err) {
    btn.disabled = false;
    btn.innerHTML = "✅ Enregistrer l'anomalie";
    alert("❌ Erreur Firebase :\n" + err.message);
  }
}

/* ── Historique ── */
let historyVisible = false;
function toggleHistory() {
  historyVisible = !historyVisible;
  document.getElementById("form-view").style.display = historyVisible ? "none" : "block";
  document.getElementById("history-view").classList.toggle("show", historyVisible);
  if (historyVisible) loadHistory();
}
async function loadHistory() {
  const list = document.getElementById("history-list");
  list.innerHTML = "<p class='empty-state' style='padding:20px 0'>Chargement…</p>";
  try {
    const snap = await db.collection("anomalies").orderBy("ts","desc").limit(50).get();
    if (snap.empty) {
      list.innerHTML = "<p class='empty-state' style='padding:20px 0'>Aucune anomalie déclarée.</p>";
      return;
    }
    list.innerHTML = snap.docs.map(doc => {
      const d  = doc.data();
      const dt = d.date ? new Date(d.date).toLocaleString("fr-FR") : "—";
      const infos = [d.support, d.kit, d.engin].filter(Boolean).join(" · ");
      const dec   = d.declarant_email ? `<span style="opacity:.7">· ${d.declarant_email}</span>` : "";
      return `<div class="history-item">
        <div class="history-item-top">
          <span class="hist-badge">${d.categorie || "—"}</span>
          <span class="hist-date">${dt} ${dec}</span>
        </div>
        <div class="hist-path">${(d.chemin || []).join(" › ")}</div>
        ${infos ? `<div class="hist-fields">${infos}</div>` : ""}
        ${d.commentaire ? `<div class="hist-fields" style="margin-top:4px;font-style:italic">"${d.commentaire}"</div>` : ""}
      </div>`;
    }).join("");
  } catch(err) {
    list.innerHTML = `<p class="empty-state" style="color:#dc2626">Erreur : ${err.message}</p>`;
  }
}

/* ── Réinitialisation ── */
function restart() {
  currentStepId  = TREE.start;
  stepHistory    = [];
  collected      = {};
  breadcrumb     = [];
  historyVisible = false;
  document.getElementById("form-view").style.display = "block";
  document.getElementById("history-view").classList.remove("show");
  render();
}
</script>
