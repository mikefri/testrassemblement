<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Déclaration d'anomalie – Rassemblement kit</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    /* ── Tokens ── */
    :root {
      --bg:        #f0f2f5;
      --surface:   #ffffff;
      --primary:   #151c2c;
      --accent:    #e8600a;
      --accent-lt: #fff3eb;
      --border:    #dde1e8;
      --muted:     #6b7280;
      --success-bg:#dcfce7;
      --success:   #15803d;
      --radius:    14px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      color: #111827;
    }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
    header p  { font-size: 12px; opacity: 0.55; margin-top: 1px; }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-history {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 13px;
      font-size: 13px;
      cursor: pointer;
      font-family: var(--font);
      transition: background .15s;
    }
    .btn-history:hover { background: rgba(255,255,255,0.22); }

    /* ── Container ── */
    .container {
      max-width: 660px;
      margin: 0 auto;
      padding: 20px 14px 40px;
    }

    /* ── Progress ── */
    .progress-wrap { margin-bottom: 18px; }
    .progress-track {
      background: var(--border);
      height: 5px;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      background: var(--accent);
      height: 100%;
      border-radius: 10px;
      transition: width .35s ease;
    }
    .progress-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
      text-align: right;
    }

    /* ── Breadcrumb ── */
    .breadcrumb {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 16px;
      align-items: center;
    }
    .bc-item {
      font-size: 12px;
      background: var(--accent-lt);
      color: var(--accent);
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
      white-space: nowrap;
    }
    .bc-sep { color: var(--muted); font-size: 13px; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 22px 20px;
      margin-bottom: 14px;
      animation: slide-up .2s ease;
    }
    @keyframes slide-up {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .step-tag {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .step-question {
      font-size: 19px;
      font-weight: 700;
      color: #111827;
      line-height: 1.3;
      margin-bottom: 18px;
    }

    /* ── Options (select buttons) ── */
    .options { display: flex; flex-direction: column; gap: 10px; }

    .opt-btn {
      width: 100%;
      text-align: left;
      padding: 15px 18px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 11px;
      font-size: 16px;
      font-weight: 500;
      color: #111827;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: border-color .15s, background .15s, color .15s;
      font-family: var(--font);
      line-height: 1.35;
    }
    .opt-btn:hover {
      border-color: var(--accent);
      background: var(--accent-lt);
      color: var(--accent);
    }
    .opt-btn .chevron {
      opacity: .4;
      font-size: 20px;
      flex-shrink: 0;
    }

    /* ── Fields ── */
    .fields { display: flex; flex-direction: column; gap: 14px; }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .field input,
    .field textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: 16px;
      color: #111827;
      background: var(--bg);
      outline: none;
      transition: border-color .15s, background .15s;
      font-family: var(--font);
    }
    .field input:focus,
    .field textarea:focus {
      border-color: var(--accent);
      background: #fff;
    }
    .field textarea { resize: vertical; min-height: 110px; }
    .field input.error { border-color: #dc2626; }

    /* ── Info banner ── */
    .info-banner {
      background: var(--accent-lt);
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 15px;
      color: #9a3e00;
      font-weight: 500;
      line-height: 1.5;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: filter .15s, transform .1s;
      font-family: var(--font);
    }
    .btn:active { transform: scale(.98); }

    .btn-back {
      background: var(--border);
      color: var(--muted);
      flex: 0 0 auto;
    }
    .btn-back:hover { filter: brightness(.93); }

    .btn-next {
      background: var(--accent);
      color: #fff;
      flex: 1;
    }
    .btn-next:hover { filter: brightness(1.07); }

    .btn-submit-main {
      width: 100%;
      padding: 16px;
      background: var(--success);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      transition: filter .15s;
    }
    .btn-submit-main:hover { filter: brightness(1.07); }
    .btn-submit-main:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Summary ── */
    .summary-table {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .summary-header {
      background: var(--primary);
      color: #fff;
      padding: 14px 18px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .summary-row {
      display: flex;
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      gap: 14px;
      background: var(--surface);
    }
    .summary-row:last-child { border-bottom: none; }
    .s-key {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      min-width: 150px;
      flex-shrink: 0;
    }
    .s-val {
      font-size: 13px;
      color: #111827;
      font-weight: 600;
    }

    /* ── Success ── */
    .success-state {
      text-align: center;
      background: var(--success-bg);
      border: 1.5px solid #86efac;
      border-radius: var(--radius);
      padding: 32px 24px;
      display: none;
    }
    .success-state.show { display: block; }
    .success-icon { font-size: 52px; margin-bottom: 12px; }
    .success-state h2 { color: var(--success); font-size: 22px; margin-bottom: 8px; }
    .success-state p  { color: #166534; font-size: 15px; }
    .btn-new {
      margin-top: 18px;
      padding: 12px 28px;
      background: var(--success);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
    }

    /* ── History view ── */
    .history-wrap { display: none; }
    .history-wrap.show { display: block; }

    .history-item {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 14px 18px;
      margin-bottom: 10px;
    }
    .history-item-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .hist-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 100px;
      background: var(--accent-lt);
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .hist-date { font-size: 12px; color: var(--muted); margin-left: auto; }
    .hist-path { font-size: 13px; font-weight: 600; color: #111827; }
    .hist-fields { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }
    .empty-state p { font-size: 15px; }

    /* ── Loading ── */
    .spinner {
      width: 22px; height: 22px;
      border: 3px solid #fff3;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo">⚠</div>
  <div>
    <h1>Déclaration d'anomalie</h1>
    <p>Rassemblement de kit</p>
  </div>
  <div class="header-right">
    <button class="btn-history" onclick="toggleHistory()">📋 Historique</button>
  </div>
</header>

<div class="container">
  <div id="form-view">
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progress-label">Étape 1</div>
    </div>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div id="step-container"></div>
  </div>

  <div class="history-wrap" id="history-view">
    <div class="card" style="margin-bottom:0">
      <div class="step-tag">Historique</div>
      <div class="step-question" style="font-size:17px; margin-bottom:16px;">Anomalies déclarées</div>
      <div id="history-list"><p class="empty-state" style="padding:20px 0">Chargement…</p></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-next" onclick="toggleHistory()">← Nouvelle déclaration</button>
    </div>
  </div>
</div>

<script>
/* ================================================================
   🔥  FIREBASE — REMPLACEZ CES VALEURS PAR VOTRE PROJET
   ================================================================ */
const firebaseConfig = {
  apiKey:            "VOTRE_API_KEY",
  authDomain:        "VOTRE_PROJECT.firebaseapp.com",
  projectId:         "VOTRE_PROJECT_ID",
  storageBucket:     "VOTRE_PROJECT.appspot.com",
  messagingSenderId: "VOTRE_SENDER_ID",
  appId:             "VOTRE_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================================================================
   🌳  ARBORESCENCE COMPLÈTE DES ANOMALIES
   ================================================================ */

/* --- Nœuds réutilisables --- */

function commentStep() {
  return {
    id: "commentaire",
    type: "textarea",
    tag: "Étape finale",
    question: "Un commentaire à ajouter ?",
    field: "commentaire",
    placeholder: "Description complémentaire, référence, contexte… (optionnel)",
    required: false,
    next: null   // → résumé
  };
}

function fieldsStep(libelle, fields, nextFn) {
  return {
    id: "fields_" + libelle,
    type: "fields",
    tag: "Identification",
    question: libelle,
    fields: fields,
    next: nextFn
  };
}

const FIELDS_DEFAULT = [
  { key: "support", label: "Support *",  placeholder: "Ex : Support S45",   required: true },
  { key: "kit",     label: "Kit *",      placeholder: "Ex : Kit frein 273", required: true },
  { key: "engin",   label: "Engin *",    placeholder: "Ex : TER X73500",    required: true }
];

const FIELDS_KIT_MERE = [
  { key: "support", label: "Support *",    placeholder: "Ex : Support S45",   required: true },
  { key: "kit",     label: "Kit mère *",   placeholder: "Ex : Kit frein 273", required: true },
  { key: "engin",   label: "Engin *",      placeholder: "Ex : TER X73500",    required: true }
];

/* ---------------------------------------------------------
   LOGICIEL
   --------------------------------------------------------- */
const logicielTree = {
  id: "logiciel_type",
  type: "select",
  tag: "Logiciel",
  question: "Type de problème logiciel ?",
  options: [
    {
      label: "Déclenchement de mouvement HS",
      next: fieldsStep(
        "Identification du kit mère concerné",
        FIELDS_KIT_MERE,
        () => commentStep()
      )
    }
  ]
};

/* ---------------------------------------------------------
   FLUX
   --------------------------------------------------------- */
const fluxTree = {
  id: "flux_type",
  type: "select",
  tag: "Flux",
  question: "Type de problème flux ?",
  options: [
    {
      label: "Appro manquant",
      next: fieldsStep("Identification du matériel concerné", FIELDS_DEFAULT, () => commentStep())
    },
    {
      label: "Pièce dep manquante",
      next: fieldsStep("Identification du matériel concerné", FIELDS_DEFAULT, () => commentStep())
    },
    {
      label: "Blocage en entrée – MAG2EPRE",
      next: fieldsStep("Identification du matériel concerné", FIELDS_DEFAULT, () => commentStep())
    },
    {
      label: "Blocage en sortie – MAG2SPRE",
      next: fieldsStep("Identification du matériel concerné", FIELDS_DEFAULT, () => commentStep())
    }
  ]
};

/* ---------------------------------------------------------
   CONTENANT › Physique › Contenant HS › Réparation
   --------------------------------------------------------- */
function reparationStep() {
  return {
    id: "reparation",
    type: "select",
    tag: "Réparation",
    question: "Le contenant peut-il être réparé ?",
    options: [
      {
        label: "Oui",
        next: {
          id: "stockage_hs",
          type: "text",
          tag: "Stockage HS",
          question: "Emplacement de stockage HS ?",
          field: "stockage_hs",
          placeholder: "Ex : Zone HS – Allée 3, étagère B",
          required: true,
          next: commentStep()
        }
      },
      {
        label: "Non → Valorisation Matière (VM)",
        next: {
          id: "vm_info",
          type: "info",
          tag: "Action requise",
          question: "Orientation du contenant",
          message: "Le contenant non réparable sera orienté vers la Valorisation Matière (VM).",
          next: commentStep()
        }
      },
      {
        label: "Je ne sais pas",
        next: commentStep()
      }
    ]
  };
}

/* ---------------------------------------------------------
   CONTENANT › Physique
   --------------------------------------------------------- */
const physTree = {
  id: "phys_type",
  type: "select",
  tag: "Contenant – Physique",
  question: "Type de problème physique ?",
  options: [
    {
      label: "Contenant HS",
      next: {
        id: "matiere",
        type: "select",
        tag: "Matière",
        question: "Matière du contenant HS ?",
        options: [
          { label: "Bois", next: reparationStep() },
          { label: "Fer",  next: reparationStep() }
        ]
      }
    }
  ]
};

/* ---------------------------------------------------------
   CONTENANT › Logique / Physique
   --------------------------------------------------------- */
const logPhysTree = {
  id: "logphys_type",
  type: "select",
  tag: "Contenant – Logique / Physique",
  question: "Type de problème logique/physique ?",
  options: [
    {
      label: "Type de contenant non adapté",
      next: {
        id: "taille",
        type: "select",
        tag: "Taille",
        question: "Le contenant est-il…",
        options: [
          {
            label: "Trop grand",
            next: {
              id: "preco",
              type: "text",
              tag: "Préconisation",
              question: "Quelle est la préconisation ?",
              field: "preco",
              placeholder: "Ex : Remplacer par modèle B-23",
              required: false,
              next: commentStep()
            }
          },
          {
            label: "Trop petit",
            next: {
              id: "preco",
              type: "text",
              tag: "Préconisation",
              question: "Quelle est la préconisation ?",
              field: "preco",
              placeholder: "Ex : Remplacer par modèle B-23",
              required: false,
              next: commentStep()
            }
          }
        ]
      }
    }
  ]
};

/* ---------------------------------------------------------
   CONTENANT
   --------------------------------------------------------- */
const contenantTree = fieldsStep(
  "Identification du matériel concerné",
  FIELDS_DEFAULT,
  () => ({
    id: "contenant_soustype",
    type: "select",
    tag: "Contenant – Sous-catégorie",
    question: "Nature du problème contenant ?",
    options: [
      { label: "Logique / Physique", next: logPhysTree },
      { label: "Physique",           next: physTree }
    ]
  })
);

/* ---------------------------------------------------------
   RACINE
   --------------------------------------------------------- */
const ROOT = {
  id: "root",
  type: "select",
  tag: "Catégorie",
  question: "Quel type d'anomalie souhaitez-vous déclarer ?",
  options: [
    { label: "Contenant", next: contenantTree },
    { label: "Flux",      next: fluxTree      },
    { label: "Logiciel",  next: logicielTree  }
  ]
};

/* ================================================================
   📦  STATE
   ================================================================ */
let history    = [];
let currentStep = ROOT;
let collected  = {};
let breadcrumb = [];
const ESTIMATED_MAX = 9;

/* ================================================================
   🖼  RENDU
   ================================================================ */
function render() {
  const container = document.getElementById("step-container");
  const step = currentStep;

  // Progress
  const depth = history.length;
  const pct   = Math.min(Math.round((depth / ESTIMATED_MAX) * 100), 95);
  document.getElementById("progress-bar").style.width  = pct + "%";
  document.getElementById("progress-label").textContent = "Étape " + (depth + 1);

  // Breadcrumb
  const bc = document.getElementById("breadcrumb");
  bc.innerHTML = breadcrumb.map((b, i) =>
    (i > 0 ? `<span class="bc-sep">›</span>` : "") +
    `<span class="bc-item">${b}</span>`
  ).join("");

  // Card HTML
  let inner = `<div class="step-tag">${step.tag || ""}</div>
               <div class="step-question">${step.question}</div>`;

  if (step.type === "select") {
    inner += `<div class="options">` +
      step.options.map((opt, i) =>
        `<button class="opt-btn" onclick="pickOption(${i})">
          <span>${opt.label}</span>
          <span class="chevron">›</span>
        </button>`
      ).join("") +
      `</div>`;

  } else if (step.type === "fields") {
    inner += `<div class="fields">` +
      step.fields.map(f =>
        `<div class="field">
          <label>${f.label}</label>
          <input id="f_${f.key}" placeholder="${f.placeholder}"
                 value="${esc(collected[f.key] || "")}" />
        </div>`
      ).join("") +
      `</div>`;
    inner += navButtons(true, "submitFields()");

  } else if (step.type === "text") {
    inner += `<div class="fields">
                <div class="field">
                  <input id="txt_field" placeholder="${step.placeholder}"
                         value="${esc(collected[step.field] || "")}" />
                </div>
              </div>`;
    inner += navButtons(true, "submitText()");

  } else if (step.type === "textarea") {
    const isLast = step.next === null;
    inner += `<div class="fields">
                <div class="field">
                  <textarea id="ta_field" placeholder="${step.placeholder}">${esc(collected[step.field || "commentaire"] || "")}</textarea>
                </div>
              </div>`;
    inner += navButtons(true, "submitTextarea()", isLast ? "📋 Voir le récapitulatif" : "Suivant →");

  } else if (step.type === "info") {
    inner += `<div class="info-banner">${step.message}</div>`;
    inner += navButtons(true, "advanceStep()");
  }

  container.innerHTML = `<div class="card">${inner}</div>`;
}

function navButtons(showBack, onNext, nextLabel = "Suivant →") {
  const back = showBack && history.length > 0
    ? `<button class="btn btn-back" onclick="goBack()">← Retour</button>`
    : "";
  return `<div class="btn-row">${back}
            <button class="btn btn-next" onclick="${onNext}">${nextLabel}</button>
          </div>`;
}

function esc(str) {
  return String(str).replace(/"/g, "&quot;").replace(/</g, "&lt;");
}

/* ================================================================
   🔀  NAVIGATION
   ================================================================ */
function pickOption(i) {
  const opt = currentStep.options[i];
  pushHistory();
  breadcrumb.push(opt.label);
  collected["n" + history.length] = opt.label;   // trace le chemin

  const next = typeof opt.next === "function" ? opt.next() : opt.next;
  currentStep = next;
  render();
}

function submitFields() {
  const step = currentStep;
  let ok = true;
  step.fields.forEach(f => {
    const el  = document.getElementById("f_" + f.key);
    const val = el.value.trim();
    if (f.required && !val) { el.classList.add("error"); ok = false; }
    else { el.classList.remove("error"); collected[f.key] = val; }
  });
  if (!ok) { alert("❗ Veuillez remplir tous les champs obligatoires (*)"); return; }
  pushHistory();
  const next = typeof step.next === "function" ? step.next() : step.next;
  currentStep = next;
  render();
}

function submitText() {
  const val = document.getElementById("txt_field").value.trim();
  if (currentStep.required && !val) { alert("❗ Ce champ est obligatoire."); return; }
  collected[currentStep.field] = val;
  pushHistory();
  const next = typeof currentStep.next === "function" ? currentStep.next() : currentStep.next;
  currentStep = next;
  render();
}

function submitTextarea() {
  const val = document.getElementById("ta_field").value.trim();
  collected[currentStep.field || "commentaire"] = val;
  pushHistory();
  const next = typeof currentStep.next === "function" ? currentStep.next() : currentStep.next;
  if (next === null) {
    renderSummary();
  } else {
    currentStep = next;
    render();
  }
}

function advanceStep() {
  pushHistory();
  const next = typeof currentStep.next === "function" ? currentStep.next() : currentStep.next;
  currentStep = next;
  render();
}

function goBack() {
  if (!history.length) return;
  const prev = history.pop();
  currentStep = prev.step;
  collected   = prev.collected;
  breadcrumb  = prev.breadcrumb;
  render();
}

function pushHistory() {
  history.push({
    step:       currentStep,
    collected:  JSON.parse(JSON.stringify(collected)),
    breadcrumb: [...breadcrumb]
  });
}

/* ================================================================
   📋  RÉSUMÉ
   ================================================================ */
const LABEL_MAP = {
  support:    "Support",
  kit:        "Kit",
  engin:      "Engin",
  commentaire:"Commentaire",
  preco:      "Préconisation",
  stockage_hs:"Emplacement HS"
};

function renderSummary() {
  const container = document.getElementById("step-container");
  document.getElementById("progress-bar").style.width = "100%";
  document.getElementById("progress-label").textContent = "Récapitulatif";

  // Chemin sélectionné
  const path = [];
  for (let i = 1; ; i++) {
    if (collected["n" + i]) path.push(collected["n" + i]);
    else break;
  }

  // Autres champs
  const extras = Object.entries(collected)
    .filter(([k]) => !k.startsWith("n"))
    .map(([k, v]) => ({ key: LABEL_MAP[k] || k, val: v || "—" }));

  const pathRows = path.map((p, i) =>
    `<div class="summary-row">
      <span class="s-key">Niveau ${i + 1}</span>
      <span class="s-val">${p}</span>
    </div>`
  ).join("");

  const extraRows = extras.map(e =>
    `<div class="summary-row">
      <span class="s-key">${e.key}</span>
      <span class="s-val">${e.val}</span>
    </div>`
  ).join("");

  container.innerHTML = `
    <div class="card" style="margin-bottom:16px">
      <div class="step-tag">Récapitulatif</div>
      <div class="step-question" style="font-size:17px">Vérifiez avant d'enregistrer</div>
    </div>

    <div class="summary-table">
      <div class="summary-header">📋 Chemin d'anomalie</div>
      ${pathRows}
    </div>

    ${extras.length ? `
    <div class="summary-table">
      <div class="summary-header">📝 Données saisies</div>
      ${extraRows}
    </div>` : ""}

    <div style="display:flex; gap:10px; margin-bottom:14px;">
      <button class="btn btn-back" style="flex:0 0 auto" onclick="restart()">↺ Recommencer</button>
      <button class="btn-submit-main" id="save-btn" onclick="saveAnomaly()" style="flex:1">✅ Enregistrer l'anomalie</button>
    </div>

    <div class="success-state" id="success-state">
      <div class="success-icon">✅</div>
      <h2>Anomalie enregistrée !</h2>
      <p>La déclaration a été sauvegardée avec succès dans Firebase.</p>
      <button class="btn-new" onclick="restart()">+ Nouvelle déclaration</button>
    </div>
  `;
}

/* ================================================================
   💾  FIREBASE – ENREGISTREMENT
   ================================================================ */
async function saveAnomaly() {
  const btn = document.getElementById("save-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Enregistrement…';

  const path = [];
  for (let i = 1; ; i++) {
    if (collected["n" + i]) path.push(collected["n" + i]);
    else break;
  }

  const doc = {
    chemin:    path,
    categorie: path[0] || "",
    support:   collected.support   || "",
    kit:       collected.kit       || "",
    engin:     collected.engin     || "",
    commentaire: collected.commentaire || "",
    preco:     collected.preco     || "",
    stockage_hs: collected.stockage_hs || "",
    date:      new Date().toISOString(),
    ts:        firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    await db.collection("anomalies").add(doc);
    document.getElementById("success-state").classList.add("show");
    btn.style.display = "none";
  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = "✅ Enregistrer l'anomalie";
    alert("❌ Erreur Firebase :\n" + err.message +
          "\n\nVérifiez votre configuration firebaseConfig dans le fichier.");
  }
}

/* ================================================================
   📋  HISTORIQUE
   ================================================================ */
let historyVisible = false;

function toggleHistory() {
  historyVisible = !historyVisible;
  document.getElementById("form-view").style.display    = historyVisible ? "none" : "block";
  document.getElementById("history-view").classList.toggle("show", historyVisible);
  if (historyVisible) loadHistory();
}

async function loadHistory() {
  const list = document.getElementById("history-list");
  list.innerHTML = "<p class='empty-state' style='padding:20px 0'>Chargement…</p>";
  try {
    const snap = await db.collection("anomalies")
      .orderBy("ts", "desc").limit(50).get();

    if (snap.empty) {
      list.innerHTML = "<p class='empty-state' style='padding:20px 0'>Aucune anomalie déclarée.</p>";
      return;
    }

    list.innerHTML = snap.docs.map(doc => {
      const d  = doc.data();
      const dt = d.date ? new Date(d.date).toLocaleString("fr-FR") : "—";
      const infos = [d.support, d.kit, d.engin].filter(Boolean).join(" · ");
      return `
        <div class="history-item">
          <div class="history-item-top">
            <span class="hist-badge">${d.categorie || "—"}</span>
            <span class="hist-date">${dt}</span>
          </div>
          <div class="hist-path">${(d.chemin || []).join(" › ")}</div>
          ${infos ? `<div class="hist-fields">${infos}</div>` : ""}
          ${d.commentaire ? `<div class="hist-fields" style="margin-top:4px;font-style:italic">"${d.commentaire}"</div>` : ""}
        </div>`;
    }).join("");
  } catch (err) {
    list.innerHTML = `<p class="empty-state" style="color:#dc2626">Erreur : ${err.message}</p>`;
  }
}

/* ================================================================
   🔄  RESET
   ================================================================ */
function restart() {
  history    = [];
  currentStep = ROOT;
  collected  = {};
  breadcrumb = [];
  historyVisible = false;
  document.getElementById("form-view").style.display   = "block";
  document.getElementById("history-view").classList.remove("show");
  render();
}

/* ── INIT ── */
render();
</script>
