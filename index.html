<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Déclaration d'anomalie – Rassemblement kit</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      color: #2c3e50;
    }
    label {
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }
    input, select, textarea, button {
      width: 100%;
      margin-top: 5px;
      padding: 8px;
      font-size: 16px;
    }
    .step {
      margin-bottom: 15px;
    }
    button {
      background: #2c7be5;
      color: white;
      border: none;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Déclaration d’anomalie</h1>

<!-- ===== CHAMPS AGENT ===== -->
<div class="step">
  <label>Support *</label>
  <input id="support" placeholder="Ex : Support S45" required />

  <label>Kit *</label>
  <input id="kit" placeholder="Ex : Kit frein 273" required />

  <label>Engin *</label>
  <input id="engin" placeholder="Ex : TER X73500" required />
</div>

<hr>

<div id="form"></div>

<button onclick="submitAnomaly()">✅ Enregistrer l’anomalie</button>

<script>
/* ==========================
   🔥 CONFIG FIREBASE
   ========================== */
const firebaseConfig = {
  apiKey: "REMPLACER",
  authDomain: "REMPLACER",
  projectId: "REMPLACER",
  storageBucket: "REMPLACER",
  messagingSenderId: "REMPLACER",
  appId: "REMPLACER"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ==========================
   🌳 ARBORESCENCE ANOMALIES
   ========================== */
const tree = {
  label: "Type d’anomalie",
  children: [
    {
      label: "Contenant",
      children: [
        {
          label: "Logique / Physique",
          children: [
            {
              label: "Type de contenant non adapté",
              children: [
                { label: "Trop grand" },
                { label: "Trop petit" }
              ]
            },
            {
              label: "Contenant HS",
              children: [
                { label: "Bois" },
                { label: "Fer" }
              ]
            }
          ]
        }
      ]
    },
    {
      label: "Flux",
      children: [
        { label: "Appro manquant" },
        { label: "Blocage en entrée MAG2EPRE" },
        { label: "Blocage en sortie MAG2SPRE" }
      ]
    },
    {
      label: "Logiciel",
      children: [
        { label: "Déclenchement de mouvement HS" }
      ]
    }
  ]
};

let selections = [];
const formDiv = document.getElementById("form");

/* ==========================
   📐 FORMULAIRE DYNAMIQUE
   ========================== */
function renderStep(node, level = 0) {
  document.querySelectorAll(`[data-level]`).forEach(el => {
    if (parseInt(el.dataset.level) >= level) el.remove();
  });
  selections = selections.slice(0, level);

  if (!node.children) return;

  const div = document.createElement("div");
  div.className = "step";
  div.dataset.level = level;

  const label = document.createElement("label");
  label.textContent = node.label;

  const select = document.createElement("select");
  select.innerHTML = `<option value="">-- Sélectionner --</option>`;

  node.children.forEach(child => {
    const opt = document.createElement("option");
    opt.value = child.label;
    opt.textContent = child.label;
    select.appendChild(opt);
  });

  select.onchange = () => {
    const selected = node.children.find(c => c.label === select.value);
    selections[level] = select.value;
    if (selected) renderStep(selected, level + 1);
  };

  div.appendChild(label);
  div.appendChild(select);
  formDiv.appendChild(div);
}

/* ==========================
   📝 COMMENTAIRE
   ========================== */
const commentDiv = document.createElement("div");
commentDiv.innerHTML = `
  <label>Commentaire</label>
  <textarea id="comment" rows="4" placeholder="Commentaire libre (optionnel)"></textarea>
`;
formDiv.appendChild(commentDiv);

/* ==========================
   💾 ENREGISTREMENT
   ========================== */
function submitAnomaly() {
  const support = document.getElementById("support").value.trim();
  const kit = document.getElementById("kit").value.trim();
  const engin = document.getElementById("engin").value.trim();
  const commentaire = document.getElementById("comment").value;

  if (!support || !kit || !engin) {
    alert("❗ Support, Kit et Engin sont obligatoires");
    return;
  }

  db.collection("anomalies").add({
    support,
    kit,
    engin,
    chemin: selections,
    commentaire,
    date: new Date().toISOString()
  })
  .then(() => {
    alert("✅ Anomalie enregistrée");
    location.reload();
  })
  .catch(err => alert("❌ Erreur : " + err));
}

/* INIT */
renderStep(tree);
</script>

</body>
</html>
``
